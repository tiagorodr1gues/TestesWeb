<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../css/contacto.css" />
</head>
<body>

  <header class="navbar">
    <a href="../index.html" class="logo">A Senda de Santiago</a>
    <nav class="menu">

    <div class="top-right-buttons">
      <button id="theme-toggle" aria-label="Alternar tema">🌑</button>
    </div>
  </header>

  <section id="contacto">
    <h1>Caso precises não penses duas vezes, entra em contacto!</h1>
    <p>Se tiveres alguma dúvida, podes entrar em contacto por aqui.</p>
    <form
      id="contactForm"
      action="mailto:emailexemplo@exemplo.com"
      method="post"
      enctype="text/plain">
      <input type="text" name="nome" placeholder="O seu nome" required />
      <input type="email" name="email" placeholder="O seu email" required />
      <textarea
        name="mensagem"
        placeholder="A sua mensagem"
        required>
      </textarea>
      <button type="submit">Enviar Mensagem</button>
    </form>
  </section>

  <script src="../js/views/dia-noite.js"></script>
</body>
</html>
