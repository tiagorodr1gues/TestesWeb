<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - Senda</title>
  <link rel="stylesheet" href="../css/criar-conta.css" />
</head>
<body>
  <header class="navbar">
    <a href="../index.html" class="logo">Senda</a>
    <nav class="menu">
  <a href="Prepare-se.html">Prepare-se</a>
  <a href="Durante-o-Caminho.html">Durante o Caminho</a>
  <a href="Santiago-e-Galiza.html">Santiago e Galiza</a>
  <a href="contacto.html">Contactos</a>
</nav>

    <button onclick="location.href='criar-conta-admin.html'">Acesso Admin</button>
  </header>

  <main>
    <section class="form-criar-conta" style="max-width: 600px; margin: 2rem auto;">
      <h2>Criar Conta</h2>
      <form action="#" method="POST" id="create-account-form">
        <label for="username">Nome de Utilizador:</label>
        <input type="text" id="username" name="username" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required />

        <label for="confirm-password">Confirmar Senha:</label>
        <input type="password" id="confirm-password" name="confirm-password" required />

        <button type="submit" style="margin-top: 1rem;">Criar Conta</button>
      </form>

      <p>Já tem uma conta? <a href="../index.html">Entrar</a></p>
    </section>
  </main>
</body>
</html>
