<!DOCTYPE html> 
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Senda</title>
  <link rel="stylesheet" href="../CSS/criar-conta-admin.css" />
</head>
<body>
  <header class="navbar">
    <a href="../index.html" class="logo">Senda</a>
  <nav class="menu">
  <a href="../index.html">Senda</a> 
  
  <a href="prepare-se.html">Prepare-se</a>
  <a href="durante-o-caminho.html">Durante o Caminho</a>
  <a href="santiago-e-galiza.html">Santiago e Galiza</a>
  <a href="recomendacoes.html">Recomendações</a>
  <a href="contacto.html">Contactos</a>
</nav>

    <div class="top-right-buttons">
      <button id="logout-btn" class="login-button">Logout</button>
      <button id="theme-toggle" aria-label="Alternar tema">🌑</button>
    </div>
  </header>

  <section class="admin-container">
    <h1>Painel de Administração</h1>
    <button class="logout-btn" id="logout-btn-top">Logout</button>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Admin</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        </tbody>
    </table>
  </section>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;

    function updateThemeIcon() {
      themeToggle.textContent = body.classList.contains('dark-theme') ? '☀️' : '🌑';
    }

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark-theme');
      updateThemeIcon();
    });

    updateThemeIcon();

    let users = [
      { id: 1, name: 'João Silva', email: 'joao@email.com', isAdmin: true },
      { id: 2, name: 'Maria Santos', email: 'maria@email.com', isAdmin: false },
      { id: 3, name: 'Pedro Costa', email: 'pedro@email.com', isAdmin: false },
    ];

    const userTableBody = document.getElementById('user-table-body');

    function renderUsers() {
      userTableBody.innerHTML = '';
      users.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.isAdmin ? 'Sim' : 'Não'}</td>
          <td>
            <button class="delete-btn" data-id="${user.id}">Excluir</button>
          </td>
        `;
        userTableBody.appendChild(tr);
      });

      document.querySelectorAll('.delete-btn').forEach(button => {
        button.addEventListener('click', (e) => {
          const id = parseInt(e.target.dataset.id);
          users = users.filter(u => u.id !== id);
          renderUsers();
        });
      });
    }

    renderUsers();

    // CORREÇÃO: Logout redireciona para a raiz
    const handleLogout = () => {
      alert('Logout efetuado!');
      window.location.href = '../index.html';
    };

    document.getElementById('logout-btn').addEventListener('click', handleLogout);
    document.getElementById('logout-btn-top').addEventListener('click', handleLogout);
  </script>
</body>
</html>
